<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бункер - Реєстрація</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Реєстрація в Бункер</h2>
    <form id="registerForm">
        <input type="text" id="username" placeholder="Придумай логін" required>
        <input type="password" id="password" placeholder="Придумай пароль" required>
        <button type="submit">Зареєструватися</button>
    </form>
    <div id="message"></div>
    <br>
    <a href="login.html" style="color: #aaa; text-decoration: none; font-size: 14px;">Вже є акаунт? Увійти</a>
</div>

<script src="app.js"></script>
</body>
</html>
